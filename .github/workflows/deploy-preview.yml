# GitHub Actions Workflow: Deploy Preview Server
# Builds preview site + forward-auth images, pushes to GHCR,
# then deploys three containers on the remote host:
#   1. aascmed-preview        — Gatsby develop (draft content)
#   2. preview-forward-auth   — Strapi-based login / JWT verification
#   3. preview-caddy          — TLS reverse proxy with forward_auth

name: Deploy Preview Server

on:
  push:
    branches:
      - main

  # Allow manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-preview
  AUTH_IMAGE_NAME: ${{ github.repository }}-preview-auth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Preview site image ────────────────────────────────────────────
      - name: Extract metadata (preview)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./preview-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Forward-auth image ────────────────────────────────────────────
      - name: Extract metadata (forward-auth)
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AUTH_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push forward-auth image
        uses: docker/build-push-action@v5
        with:
          context: ./preview-server/forward-auth
          file: ./preview-server/forward-auth/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to remote server ───────────────────────────────────────
      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PREVIEW_SERVER_HOST }}
          username: ${{ secrets.PREVIEW_SERVER_USER }}
          key: ${{ secrets.PREVIEW_SERVER_SSH_KEY }}
          source: "preview-server/Caddyfile,preview-server/docker-compose.yml"
          target: "/home/${{ secrets.PREVIEW_SERVER_USER }}/"
          strip_components: 1

      - name: Deploy with Podman Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PREVIEW_SERVER_HOST }}
          username: ${{ secrets.PREVIEW_SERVER_USER }}
          key: ${{ secrets.PREVIEW_SERVER_SSH_KEY }}
          script: |
            set -e

            # ── Registry login ──────────────────────────────────────────
            echo ${{ secrets.GITHUB_TOKEN }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/

            # ── Write .env with secrets and image tags ──────────────────
            cat > .env <<'DOTENV'
            PREVIEW_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            AUTH_IMAGE=${{ env.REGISTRY }}/${{ env.AUTH_IMAGE_NAME }}:${{ github.ref_name }}
            GATSBY_STRAPI_API_URL=${{ vars.GATSBY_STRAPI_API_URL }}
            STRAPI_TOKEN=${{ secrets.STRAPI_TOKEN }}
            GATSBY_REFRESH_TOKEN=${{ secrets.GATSBY_REFRESH_TOKEN }}
            GATSBY_MAPBOX_API_KEY=${{ secrets.GATSBY_MAPBOX_API_KEY }}
            GATSBY_API_BASE_URL=${{ vars.GATSBY_API_BASE_URL }}
            PREVIEW_DOMAIN=${{ vars.PREVIEW_DOMAIN }}
            PREVIEW_CERTS_PATH=${{ vars.PREVIEW_CERTS_PATH }}
            PREVIEW_HTTPS_PORT=8443
            PREVIEW_HTTP_PORT=8080
            DOTENV
            # Strip leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            # ── Pull and (re)start ──────────────────────────────────────
            podman compose pull
            podman compose up -d --remove-orphans

            # ── Cleanup ─────────────────────────────────────────────────
            podman image prune -f
