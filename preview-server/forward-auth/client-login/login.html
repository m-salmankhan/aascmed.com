<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Preview Login — AASC Med</title>

  <link rel="icon" href="/auth/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/auth/favicon.ico" sizes="any" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/auth/style.css" />
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <!-- Logo + heading -->
        <div class="text-center mt-5 mb-4">
          <div
            class="logo mx-auto mb-3"
            role="img"
            aria-label="Allergy, Asthma &amp; Sinus Centers"
          ></div>
          <h1 class="fw-bold text-body-secondary">Content Preview</h1>
          <p class="small text-body-tertiary mb-0">Sign in with your Strapi admin credentials to preview draft content.</p>
        </div>

        <!-- Card with form -->
        <div class="card shadow-sm">
          <div class="card-body p-4">

            <div id="error-msg" class="alert alert-danger d-none mb-3" role="alert">
              Invalid email or password.
            </div>

            <form id="login-form" action="/login" method="POST">
              <div class="mb-3">
                <label for="identifier" class="form-label">Email address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                  <input type="email" class="form-control" id="identifier" name="identifier" placeholder="you@example.com" required autofocus />
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
                </div>
              </div>

              <div class="d-grid">
                <button id="submit-btn" type="submit" class="btn btn-success">
                  <span id="btn-text">Sign in</span>
                  <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                </button>
              </div>
            </form>

          </div>
        </div>

        <p class="text-center text-body-tertiary small mt-4">
          &copy; 2026 Allergy, Asthma &amp; Sinus Centers
        </p>

      </div>
    </div>
  </div>

  <script src="/auth/login.js"></script>
</body>
</html>
