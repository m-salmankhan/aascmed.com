<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview Login — AASC Med</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1fQ5TmplhAAlXdYiq6RIM2SDKID80E"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- Google Fonts: Poppins (brand font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
    rel="stylesheet"
  />

  <!-- Brand overrides -->
  <link rel="stylesheet" href="/auth/style.css" />
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

  <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
    <!-- Brand header -->
    <div class="card-header bg-brand-primary text-center py-4 border-0">
      <img
        src="https://brand.aascmed.com/raster/horizontal-white.png"
        alt="Allergy, Asthma and Sinus Centers"
        class="img-fluid"
        style="max-height: 48px;"
      />
    </div>

    <div class="card-body p-4">
      <h1 class="h5 text-center mb-1 fw-semibold">Content Preview</h1>
      <p class="text-muted text-center small mb-4">Sign in with your Strapi account</p>

      <!-- Error alert (hidden by default, shown via JS) -->
      <div id="error-msg" class="alert alert-danger py-2 small d-none" role="alert">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        Invalid email or password. Please try again.
      </div>

      <form id="login-form" action="/login" method="POST">
        <div class="mb-3">
          <label for="identifier" class="form-label small fw-semibold">Email address</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
            <input
              id="identifier"
              name="identifier"
              type="email"
              class="form-control"
              placeholder="you@example.com"
              required
              autofocus
            />
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button id="submit-btn" type="submit" class="btn btn-brand w-100 fw-semibold">
          <span id="btn-text">Sign in</span>
          <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
        </button>
      </form>
    </div>

    <div class="card-footer bg-white text-center border-0 py-3">
      <small class="text-muted">
        &copy; 2026 Allergy, Asthma and Sinus Centers
      </small>
    </div>
  </div>

  <script src="/auth/login.js"></script>
</body>
</html>
